<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外贸内参 · 汇总</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #faf9f7;
            --color-paper: #ffffff;
            --color-ink: #1a1a2e;
            --color-ink-light: #5d6d7e;
            --color-accent: #d4a373;
            --color-accent-dark: #b8935f;
            --border-light: #e8e4de;
            --border-medium: #d4cfc7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', 'Songti SC', Georgia, serif;
            line-height: 1.75;
            color: var(--color-ink);
            background: var(--color-bg);
            font-size: 15px;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 60px 24px; }
        .masthead {
            text-align: center;
            padding-bottom: 32px;
            border-bottom: 3px double var(--color-ink);
            margin-bottom: 32px;
        }
        .masthead::before {
            content: '';
            display: block;
            height: 4px;
            background: linear-gradient(90deg, var(--color-ink) 0%, var(--color-accent) 50%, var(--color-ink) 100%);
            margin: -60px -24px 40px -24px;
        }
        .publication-title {
            font-family: 'Playfair Display', 'Noto Serif SC', serif;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 8px;
            color: var(--color-ink);
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .publication-subtitle { font-size: 12px; color: var(--color-ink-light); letter-spacing: 2px; margin-bottom: 8px; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--color-ink); }
        #report-wrap {
            background: var(--color-paper);
            border: 1px solid var(--border-light);
            margin-bottom: 48px;
            min-height: 400px;
            overflow: hidden;
        }
        #report-frame { width: 100%; height: 80vh; min-height: 500px; border: 0; display: block; }
        .no-report { padding: 40px; text-align: center; color: var(--color-ink-light); }
        .calendar-section { margin-top: 48px; }
        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .calendar-title { font-size: 20px; font-weight: 600; }
        .calendar-nav { display: flex; gap: 8px; }
        .calendar-nav button {
            padding: 6px 14px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            background: var(--color-paper);
            border: 1px solid var(--border-medium);
            color: var(--color-ink);
            border-radius: 4px;
        }
        .calendar-nav button:hover { background: var(--color-bg); border-color: var(--color-accent); }
        .calendar-nav button:disabled { opacity: 0.5; cursor: not-allowed; }
        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--color-ink-light);
            text-align: center;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border-radius: 6px;
            background: var(--color-bg);
            border: 1px solid var(--border-light);
            color: var(--color-ink-light);
        }
        .calendar-day.has-data {
            cursor: pointer;
            text-decoration: none;
            color: var(--color-ink);
            font-weight: 600;
        }
        .calendar-day.has-data:hover { border-color: var(--color-accent); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .calendar-day.mood-label { font-size: 10px; margin-top: 2px; }
        .calendar-day.empty { opacity: 0.5; }
        @media (max-width: 640px) {
            .container { padding: 24px 16px; }
            .publication-title { font-size: 28px; letter-spacing: 4px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="masthead">
            <div class="publication-title">外贸内参</div>
            <div class="publication-subtitle">Waimao Intelligence Briefing · 汇总</div>
        </header>
        <section id="report-section">
            <h2 class="section-title">当日最新内参</h2>
            <div id="report-wrap"><iframe id="report-frame" src="neican-2026-03-16.html" title="当日内参"></iframe></div>
        </section>
        <section class="calendar-section">
            <h2 class="section-title">情绪日历</h2>
            <div class="calendar-header">
                <span class="calendar-title" id="calendar-title">加载中…</span>
                <div class="calendar-nav">
                    <button type="button" id="btn-prev" aria-label="上一月">上一月</button>
                    <button type="button" id="btn-next" aria-label="下一月">下一月</button>
                </div>
            </div>
            <div class="calendar-weekdays">
                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </section>
    </div>
    <script>
(function() {
    const MIN_YEAR = 2026, MIN_MONTH = 3;
    let manifest = { days: [] };
    let currentYear = 2026, currentMonth = 3;

    function parseDate(dateStr) {
        const [y, m, d] = dateStr.split('-').map(Number);
        return { y, m, d };
    }

    function getDaysInMonth(y, m) {
        const first = new Date(y, m - 1, 1);
        const last = new Date(y, m, 0);
        return last.getDate();
    }

    function getFirstWeekday(y, m) {
        return new Date(y, m - 1, 1).getDay();
    }

    function monthKey(y, m) {
        return y + '-' + String(m).padStart(2, '0');
    }

    function buildDayMap() {
        const map = {};
        manifest.days.forEach(function(d) {
            const key = d.date;
            map[key] = { mood_word: d.mood_word, mood_color: d.mood_color, mood_reason: d.mood_reason };
        });
        return map;
    }

    function renderCalendar() {
        const titleEl = document.getElementById('calendar-title');
        const gridEl = document.getElementById('calendar-grid');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        titleEl.textContent = currentYear + ' 年 ' + currentMonth + ' 月';
        btnPrev.disabled = currentYear === MIN_YEAR && currentMonth === MIN_MONTH;
        btnNext.disabled = currentYear === new Date().getFullYear() && currentMonth === new Date().getMonth() + 1;
        const dayMap = buildDayMap();
        const daysInMonth = getDaysInMonth(currentYear, currentMonth);
        const firstWeekday = getFirstWeekday(currentYear, currentMonth);
        gridEl.innerHTML = '';
        for (let i = 0; i < firstWeekday; i++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-day empty';
            cell.setAttribute('aria-hidden', 'true');
            gridEl.appendChild(cell);
        }
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(d).padStart(2, '0');
            const info = dayMap[dateStr];
            const cell = document.createElement(info ? 'a' : 'div');
            cell.className = 'calendar-day' + (info ? ' has-data' : ' empty');
            if (info) {
                cell.href = 'neican-' + dateStr + '.html';
                cell.setAttribute('title', info.mood_reason || info.mood_word);
            }
            const dayNum = document.createElement('span');
            dayNum.textContent = d;
            cell.appendChild(dayNum);
            if (info) {
                const label = document.createElement('span');
                label.className = 'mood-label';
                label.textContent = info.mood_word;
                label.style.color = info.mood_color;
                cell.appendChild(label);
            }
            gridEl.appendChild(cell);
        }
    }

    document.getElementById('btn-prev').addEventListener('click', function() {
        if (currentMonth === 1) { currentYear--; currentMonth = 12; } else { currentMonth--; }
        if (currentYear < MIN_YEAR || (currentYear === MIN_YEAR && currentMonth < MIN_MONTH)) {
            currentYear = MIN_YEAR; currentMonth = MIN_MONTH;
        }
        renderCalendar();
    });
    document.getElementById('btn-next').addEventListener('click', function() {
        const now = new Date();
        if (currentYear > now.getFullYear() || (currentYear === now.getFullYear() && currentMonth >= now.getMonth() + 1)) return;
        if (currentMonth === 12) { currentYear++; currentMonth = 1; } else { currentMonth++; }
        renderCalendar();
    });

    fetch('./manifest.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            manifest = data;
            renderCalendar();
        })
        .catch(function() {
            document.getElementById('calendar-title').textContent = '暂无数据';
        });
})();
    </script>
</body>
</html>
